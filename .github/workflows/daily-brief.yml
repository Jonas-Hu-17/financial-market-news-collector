name: MarketNews Daily Brief

on:
  schedule:
    # 每天 08:00 北京时间 (UTC+8) = 00:00 UTC
    # 每 12 小时：00:00 和 12:00 UTC
    - cron: '0 0,12 * * *'
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Prepare config
        run: |
          cp data/config.example.json data/config.json
          # Override AI config for MarketNews
          python -c "
          import json
          cfg = json.load(open('data/config.json'))
          cfg['ai'] = {
            'provider': 'deepseek',
            'model': 'deepseek-chat',
            'api_key_env': 'DEEPSEEK_API_KEY',
            'temperature': 0.3,
            'max_tokens': 4096
          }
          json.dump(cfg, open('data/config.json', 'w'), indent=2, ensure_ascii=False)
          "

      - name: Run MarketNews pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon --marketnews --hours 24

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "📝 MarketNews Daily Brief: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
